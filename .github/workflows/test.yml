name: Automation Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (no deletions)'
        required: true
        default: 'true'

jobs:
  validate-jobs:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate and remove expired jobs
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "Running in DRY RUN mode..."
            node tests/validate-arrise-jobs.js --dry-run
          else
            echo "Running in LIVE mode (will delete expired jobs)..."
            node tests/validate-arrise-jobs.js --delete
          fi
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

  Automation-Tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: |
          npm run test:unit
          if [ -f test-report.html ]; then mv test-report.html test-results-unit.html; fi
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        continue-on-error: true

      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results-unit.html
          retention-days: 30

      - name: Run Integration Tests
        run: |
          npm run test:integration
          if [ -f test-report.html ]; then mv test-report.html test-results-integration.html; fi
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        continue-on-error: true

      - name: Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results-integration.html
          retention-days: 30

      - name: Run E2E Tests
        run: |
          npm run test:e2e
          if [ -f test-report.html ]; then mv test-report.html test-results-e2e.html; fi
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        continue-on-error: true

      - name: Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results-e2e.html
          retention-days: 30

  ensure-company-core:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Ensure ARRISE exists in company core
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        run: |
          # Check if ARRISE exists
          EXISTING=$(curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=id:40181178&rows=1" | jq '.response.numFound')

          echo "ARRISE count in company core: $EXISTING"

          # Add only if not exists
          if [ "$EXISTING" -eq "0" ]; then
            echo "ARRISE not found - adding to company core..."
            echo '[{"id":"40181178","company":"ARRISE SERVICES S.R.L.","brand":"ARRISE","status":"activ","location":["Bucuresti"],"website":["https://www.arrise.com"],"career":["https://careers.arrise.com"],"lastScraped":"2026-05-01","scraperFile":"https://raw.githubusercontent.com/carmenioanaa/arrise-srl-nodejs-scraper/master/.github/workflows/scrape.yml"}]' > company_data.json

            curl -s --user "${SOLR_AUTH}" \
              "https://solr.peviitor.ro/solr/company/update/json?commit=true" \
              -X POST \
              -H "Content-Type: application/json" \
              --data-binary @company_data.json
          else
            echo "ARRISE already exists in company core - no action needed"
          fi

          # Verify
          FINAL=$(curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=id:40181178&rows=1" | jq '.response.numFound')

          echo "ARRISE count after check: $FINAL"

          if [ "$FINAL" -ge "1" ]; then
            echo "SUCCESS: ARRISE is in company core"
          else
            echo "WARNING: ARRISE not in company core (non-fatal)"
          fi
